<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>588710 缠论实时看板</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #20242a;
      --muted: #667085;
      --grid: #e5e7eb;
      --up: #d44b45;
      --down: #177d55;
      --bi: #1f5fbf;
      --seg: #7c3aed;
      --zs: rgba(234, 179, 8, .18);
      --zs-border: rgba(180, 83, 9, .8);
      --buy: #0f766e;
      --sell: #b42318;
      --fx: #9333ea;
      --live: #ea580c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink);
      font: 14px/1.45 "Segoe UI", "Microsoft YaHei", Arial, sans-serif; }
    .app { display: grid; grid-template-columns: minmax(0, 1fr) 320px; min-height: 100vh; }
    main { padding: 16px; min-width: 0; }
    aside { border-left: 1px solid #d9dee7; background: var(--panel); padding: 16px; overflow: auto; max-height: 100vh; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    h1 { font-size: 20px; margin: 0; font-weight: 650; }
    .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .tabs, .tools, .toggles { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    button, label.toggle {
      border: 1px solid #cfd6e3; background: #fff; color: #20242a; height: 34px; padding: 0 11px;
      border-radius: 6px; cursor: pointer; font: inherit; display: inline-flex; align-items: center; gap: 6px; user-select: none;
    }
    button.active { background: #1f2937; color: #fff; border-color: #1f2937; }
    label.toggle input { margin: 0; }
    .chart-wrap { background: var(--panel); border: 1px solid #d9dee7; border-radius: 8px; overflow: hidden; position: relative; min-height: 620px; }
    canvas { width: 100%; height: 620px; display: block; cursor: crosshair; }
    .tooltip { position: absolute; pointer-events: none; background: rgba(17,24,39,.94); color: #fff; padding: 8px 10px; border-radius: 6px; min-width: 170px; font-size: 12px; display: none; z-index: 5; white-space: pre-line; }
    .panel-title { font-size: 15px; font-weight: 650; margin: 0 0 10px; }
    .stat-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; margin-bottom: 16px; }
    .stat { border: 1px solid #e3e7ee; border-radius: 7px; padding: 9px; background: #fbfcfe; }
    .stat b { display: block; font-size: 18px; }
    .stat span { color: var(--muted); font-size: 12px; }
    .legend { display: grid; gap: 8px; margin: 12px 0 18px; }
    .legend div { display: flex; align-items: center; gap: 8px; color: #344054; }
    .swatch { width: 20px; height: 3px; border-radius: 2px; display: inline-block; }
    .swatch-box { width: 16px; height: 12px; border-radius: 2px; display: inline-block; border: 1px solid var(--zs-border); background: var(--zs); }
    .swatch-live { width: 20px; height: 0; border-top: 2px dashed var(--live); display: inline-block; }
    .note { border-top: 1px solid #e3e7ee; padding-top: 12px; color: #475467; font-size: 13px; }
    .list { display: grid; gap: 8px; margin-top: 10px; }
    .item { border: 1px solid #e3e7ee; border-radius: 7px; padding: 9px; background: #fff; }
    .item strong { display: block; margin-bottom: 3px; }
    .item small { color: var(--muted); }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      aside { max-height: none; border-left: 0; border-top: 1px solid #d9dee7; }
      .topbar { align-items: flex-start; flex-direction: column; }
      canvas { height: 560px; } .chart-wrap { min-height: 560px; }
    }

    /* 实时 ticker */
    .ticker { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
    .ticker .name { font-size: 15px; font-weight: 650; }
    .ticker .price { font-size: 30px; font-weight: 700; letter-spacing: .5px; }
    .ticker .pct { font-size: 16px; font-weight: 600; }
    .ticker .ohl { color: var(--muted); font-size: 13px; }
    .badge { font-size: 12px; padding: 3px 9px; border-radius: 999px; border: 1px solid #cfd6e3; color: #475467; background: #fff; }
    .badge.on { background: #ecfdf3; border-color: #abefc6; color: #067647; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 6px; }

    /* 操作建议面板（结尾） */
    .suggest { margin: 0 0 18px; background: var(--panel); border: 1px solid #d9dee7; border-radius: 10px; padding: 16px 18px; }
    .suggest h2 { font-size: 17px; margin: 0 0 12px; display: flex; align-items: center; gap: 10px; }
    .bias { font-size: 13px; font-weight: 700; padding: 4px 12px; border-radius: 999px; }
    .bias.bull { background: #fef3f2; color: var(--up); border: 1px solid #fecdca; }
    .bias.bear { background: #ecfdf3; color: var(--down); border: 1px solid #abefc6; }
    .bias.flat { background: #fffaeb; color: #b54708; border: 1px solid #fedf89; }
    .suggest ul { margin: 0; padding-left: 20px; line-height: 1.9; }
    .suggest ul li { margin-bottom: 4px; }
    .suggest .risk { margin-top: 14px; padding-top: 12px; border-top: 1px dashed #e3e7ee; color: var(--muted); font-size: 12.5px; }
    .live-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--live); margin-right:6px; animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%{opacity:.3} 50%{opacity:1} 100%{opacity:.3} }
  </style>
</head>
<body>
  <div class="app">
    <main>
      <div class="topbar">
        <div>
          <h1>588710 缠论实时看板</h1>
          <div class="sub">算法 Vespa314/chan.py 实时计算 · 日线/30分/15分/5分/1分 五级联立</div>
        </div>
        <div class="tabs" id="tabs"></div>
      </div>

      <div class="topbar" style="align-items:flex-end;">
        <div class="ticker">
          <span class="name" id="mName">588710.SH</span>
          <span class="price" id="mPrice">--</span>
          <span class="pct" id="mPct">--</span>
          <span class="badge" id="mStatus">--</span>
          <span class="ohl" id="mOHL"></span>
          <span class="ohl" id="mTime"></span>
        </div>
        <div class="tools">
          <button id="refreshStruct" title="重新拉取缠论结构">↻ 刷新结构</button>
        </div>
      </div>

      <div class="topbar">
        <div class="toggles">
          <label class="toggle"><input type="checkbox" data-layer="bi" checked>笔</label>
          <label class="toggle"><input type="checkbox" data-layer="seg" checked>线段</label>
          <label class="toggle"><input type="checkbox" data-layer="zs" checked>中枢</label>
          <label class="toggle"><input type="checkbox" data-layer="bsp" checked>买卖点</label>
          <label class="toggle"><input type="checkbox" data-layer="vol" checked>成交量</label>
          <label class="toggle"><input type="checkbox" data-layer="macd" checked>MACD</label>
        </div>
        <div class="tools">
          <button id="zoomIn" title="放大">＋</button>
          <button id="zoomOut" title="缩小">－</button>
          <button id="reset" title="重置视图">重置</button>
        </div>
      </div>

      <div class="chart-wrap" id="chartWrap">
        <canvas id="chart"></canvas>
        <div class="tooltip" id="tooltip"></div>
      </div>

      <div class="meta" id="mFresh">K线结构全量刷新: -- ｜ 实时价: 新浪财经(每3秒)</div>
      <div class="meta" id="mUpdated"><span class="live-dot"></span>等待实时数据…</div>
    </main>

    <aside>
      <!-- 下一步操作建议（已移至右侧栏顶部） -->
      <section class="suggest">
        <h2>下一步操作建议 <span class="bias flat" id="sBias">--</span></h2>
        <ul id="sBullets"><li>加载中…</li></ul>
        <div class="risk" id="sRisk"></div>
      </section>
      <h2 class="panel-title" id="sideTitle">结构摘要</h2>
      <div class="stat-grid" id="stats"></div>
      <div class="legend">
        <div><span class="swatch" style="background: var(--up)"></span>涨 K 线</div>
        <div><span class="swatch" style="background: var(--down)"></span>跌 K 线</div>
        <div><span class="swatch" style="background: var(--bi)"></span>笔（细紫线）</div>
        <div><span class="swatch" style="background: var(--seg)"></span>线段（粗紫线）</div>
        <div><span class="swatch-box"></span>中枢价格区间</div>
        <div><span class="swatch" style="background: var(--buy)"></span>买点（▲）</div>
        <div><span class="swatch" style="background: var(--sell)"></span>卖点（▼）</div>
        <div><span class="swatch-live"></span>实时现价线</div>
      </div>
      <div class="note">滚轮缩放 · 按住拖拽平移 · 鼠标悬停查看 K 线明细。中枢虚线框为价格重叠区间，买卖点三角标注一/二类信号。</div>
      <h2 class="panel-title" style="margin-top:18px;">买卖点列表</h2>
      <div class="list" id="bspList"></div>
      <h2 class="panel-title" style="margin-top:18px;">中枢列表</h2>
      <div class="list" id="zsList"></div>
    </aside>
  </div>

  <script>
    const SYMBOL = "588710";
    let DATA = null;
    let SNAP = null;
    let livePrice = null;
    const canvas = document.getElementById('chart');
    const wrap = document.getElementById('chartWrap');
    const ctx = canvas.getContext('2d');
    const tip = document.getElementById('tooltip');
    const levelNames = { daily:'日线', '30min':'30分', '15min':'15分', '5min':'5分', '1min':'1分' };
    const initCount = { daily:264, '30min':320, '15min':320, '5min':320, '1min':320 };
    let levels = [];
    let state = {
      level: null, start: 0, count: 300, dragging: false, dragX: 0, dragStart: 0,
      layers: { bi: true, seg: true, zs: true, bsp: true, vol: true, macd: true }, hover: null
    };

    function levelData() { return DATA.levels[state.level]; }
    function clampView() {
      const n = levelData().bars.length;
      state.count = Math.max(24, Math.min(state.count, n));
      state.start = Math.max(0, Math.min(state.start, Math.max(0, n - state.count)));
    }
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }
    function parseTime(t) { return t.replace(/-/g, '/'); }
    function visibleBars() { const d = levelData(); return d.bars.slice(state.start, state.start + state.count); }
    function findIndexByTime(time) {
      const bars = levelData().bars;
      const normalized = time.slice(0, 16).replace(/\//g, '-');
      let best = -1;
      for (let i = 0; i < bars.length; i++) {
        if (bars[i].time.slice(0, 16) <= normalized) best = i; else break;
      }
      return best;
    }
    function project() {
      const rect = canvas.getBoundingClientRect();
      const w = rect.width, h = rect.height;
      const pad = { l: 58, r: 18, t: 18, b: 48 };
      const volH = state.layers.vol ? 72 : 0;
      const macdH = state.layers.macd ? 96 : 0;
      const gap = (state.layers.vol || state.layers.macd) ? 16 : 0;
      const plotH = h - pad.t - pad.b - volH - macdH - gap;
      const bars = visibleBars();
      let hi = -Infinity, lo = Infinity, maxVol = 1, macdAbs = 0, difHi = -Infinity, difLo = Infinity;
      for (const b of bars) {
        hi = Math.max(hi, b.high); lo = Math.min(lo, b.low); maxVol = Math.max(maxVol, b.vol || 0);
        macdAbs = Math.max(macdAbs, Math.abs(b.macd || 0), Math.abs(b.dif || 0), Math.abs(b.dea || 0));
        difHi = Math.max(difHi, b.dif || 0, b.dea || 0, b.macd || 0);
        difLo = Math.min(difLo, b.dif || 0, b.dea || 0, b.macd || 0);
      }
      const span = Math.max(hi - lo, 0.001);
      hi += span * 0.08; lo -= span * 0.08;
      const xStep = (w - pad.l - pad.r) / Math.max(1, bars.length);
      const volTop = pad.t + plotH + 14;
      const macdTop = volTop + volH + (state.layers.macd ? 10 : 0);
      const macdMax = Math.max(Math.abs(difHi), Math.abs(difLo), macdAbs, 0.0001);
      return {
        w, h, pad, plotH, volH, macdH, gap, volTop, macdTop, bars, hi, lo, maxVol, macdMax, xStep,
        x: i => pad.l + (i - state.start + 0.5) * xStep,
        y: v => pad.t + (hi - v) / (hi - lo) * plotH,
        volY: v => volTop + (1 - v / maxVol) * Math.max(1, volH - 18),
        macdY: v => macdTop + macdH / 2 - (v / macdMax) * (macdH * 0.42)
      };
    }
    function drawGrid(p) {
      ctx.clearRect(0, 0, p.w, p.h);
      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, p.w, p.h);
      ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 1;
      ctx.fillStyle = '#667085'; ctx.font = '12px Segoe UI, Arial';
      for (let i = 0; i <= 5; i++) {
        const y = p.pad.t + i * p.plotH / 5;
        const price = p.hi - i * (p.hi - p.lo) / 5;
        ctx.beginPath(); ctx.moveTo(p.pad.l, y); ctx.lineTo(p.w - p.pad.r, y); ctx.stroke();
        ctx.fillText(price.toFixed(3), 8, y + 4);
      }
      if (state.layers.vol) {
        ctx.strokeStyle = '#eef1f5'; ctx.beginPath(); ctx.moveTo(p.pad.l, p.volTop); ctx.lineTo(p.w - p.pad.r, p.volTop); ctx.stroke();
        ctx.fillStyle = '#667085'; ctx.fillText('VOL', 8, p.volTop + 12);
      }
      if (state.layers.macd) {
        ctx.strokeStyle = '#eef1f5'; ctx.beginPath(); ctx.moveTo(p.pad.l, p.macdY(0)); ctx.lineTo(p.w - p.pad.r, p.macdY(0)); ctx.stroke();
        ctx.fillStyle = '#667085'; ctx.fillText('MACD', 8, p.macdTop + 13);
      }
      const tickEvery = Math.max(1, Math.floor(p.bars.length / 6));
      for (let i = 0; i < p.bars.length; i += tickEvery) {
        const x = p.pad.l + (i + 0.5) * p.xStep;
        const label = p.bars[i].time.slice(5);
        ctx.fillStyle = '#667085';
        ctx.fillText(label, Math.max(p.pad.l, Math.min(p.w - p.pad.r - 70, x - 31)), p.h - 18);
        ctx.strokeStyle = '#f1f3f6';
        ctx.beginPath(); ctx.moveTo(x, p.pad.t); ctx.lineTo(x, p.h - p.pad.b + 8); ctx.stroke();
      }
    }
    function drawCandles(p) {
      for (let i = 0; i < p.bars.length; i++) {
        const b = p.bars[i], x = p.pad.l + (i + 0.5) * p.xStep;
        const up = b.close >= b.open;
        const color = up ? getCss('--up') : getCss('--down');
        ctx.strokeStyle = color; ctx.fillStyle = color;
        ctx.beginPath(); ctx.moveTo(x, p.y(b.high)); ctx.lineTo(x, p.y(b.low)); ctx.stroke();
        const bodyTop = p.y(Math.max(b.open, b.close));
        const bodyBot = p.y(Math.min(b.open, b.close));
        const bw = Math.max(2, Math.min(12, p.xStep * 0.58));
        ctx.fillRect(x - bw / 2, bodyTop, bw, Math.max(1, bodyBot - bodyTop));
        if (state.layers.vol) {
          ctx.globalAlpha = 0.35;
          ctx.fillRect(x - bw / 2, p.volY(b.vol), bw, p.volTop + p.volH - 4 - p.volY(b.vol));
          ctx.globalAlpha = 1;
        }
      }
    }
    function drawMacd(p) {
      if (!state.layers.macd) return;
      const zero = p.macdY(0);
      const bw = Math.max(1, Math.min(9, p.xStep * 0.58));
      for (let i = 0; i < p.bars.length; i++) {
        const b = p.bars[i], x = p.pad.l + (i + 0.5) * p.xStep;
        const y = p.macdY(b.macd || 0);
        ctx.fillStyle = (b.macd || 0) >= 0 ? 'rgba(212,75,69,.55)' : 'rgba(23,125,85,.55)';
        ctx.fillRect(x - bw / 2, Math.min(y, zero), bw, Math.max(1, Math.abs(zero - y)));
      }
      drawMacdLine(p, 'dif', '#2563eb');
      drawMacdLine(p, 'dea', '#f59e0b');
    }
    function drawMacdLine(p, key, color) {
      ctx.strokeStyle = color; ctx.lineWidth = 1.4; ctx.beginPath();
      for (let i = 0; i < p.bars.length; i++) {
        const x = p.pad.l + (i + 0.5) * p.xStep, y = p.macdY(p.bars[i][key] || 0);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    function drawZs(p) {
      if (!state.layers.zs) return;
      const zss = levelData().chan.zss || [];
      for (const z of zss) {
        const s = findIndexByTime(z.start_time), e = findIndexByTime(z.end_time);
        if (e < state.start || s > state.start + state.count) continue;
        const x1 = p.x(Math.max(s, state.start)) - p.xStep / 2;
        const x2 = p.x(Math.min(e, state.start + state.count - 1)) + p.xStep / 2;
        const y1 = p.y(z.high), y2 = p.y(z.low);
        ctx.fillStyle = getCss('--zs'); ctx.strokeStyle = getCss('--zs-border');
        ctx.lineWidth = 1.2; ctx.setLineDash(z.is_sure ? [] : [5, 4]);
        ctx.fillRect(x1, y1, Math.max(1, x2 - x1), Math.max(1, y2 - y1));
        ctx.strokeRect(x1, y1, Math.max(1, x2 - x1), Math.max(1, y2 - y1));
        ctx.setLineDash([]);
      }
    }
    function drawLineElements(p, key, color, width) {
      const arr = levelData().chan[key] || [];
      ctx.strokeStyle = color; ctx.lineWidth = width;
      for (const item of arr) {
        const s = findIndexByTime(item.start_time), e = findIndexByTime(item.end_time);
        if (e < state.start || s > state.start + state.count) continue;
        ctx.setLineDash(item.is_sure ? [] : [7, 5]);
        ctx.beginPath();
        ctx.moveTo(p.x(s), p.y(item.start_value));
        ctx.lineTo(p.x(e), p.y(item.end_value));
        ctx.stroke();
      }
      ctx.setLineDash([]);
    }
    function drawBsp(p) {
      if (!state.layers.bsp) return;
      const bsps = levelData().chan.bsps || [];
      ctx.font = '12px Segoe UI, Arial';
      for (const b of bsps) {
        const idx = findIndexByTime(b.time);
        if (idx < state.start || idx >= state.start + state.count) continue;
        const x = p.x(idx), y = p.y(b.value);
        ctx.fillStyle = b.is_buy ? getCss('--buy') : getCss('--sell');
        ctx.beginPath();
        if (b.is_buy) { ctx.moveTo(x, y + 11); ctx.lineTo(x - 7, y + 1); ctx.lineTo(x + 7, y + 1); }
        else { ctx.moveTo(x, y - 11); ctx.lineTo(x - 7, y - 1); ctx.lineTo(x + 7, y - 1); }
        ctx.closePath(); ctx.fill();
        ctx.fillText(b.types.join(','), x + 8, y + (b.is_buy ? 14 : -8));
      }
    }
    function drawLivePrice(p) {
      if (livePrice == null) return;
      const y = p.y(livePrice);
      ctx.save();
      ctx.strokeStyle = getCss('--live'); ctx.setLineDash([6, 4]); ctx.lineWidth = 1.3;
      ctx.beginPath(); ctx.moveTo(p.pad.l, y); ctx.lineTo(p.w - p.pad.r, y); ctx.stroke();
      ctx.setLineDash([]);
      const label = '现价 ' + livePrice.toFixed(3);
      ctx.font = '12px Segoe UI, Arial';
      const tw = ctx.measureText(label).width + 8;
      ctx.fillStyle = getCss('--live');
      ctx.fillRect(p.w - p.pad.r - tw, y - 9, tw, 18);
      ctx.fillStyle = '#fff'; ctx.fillText(label, p.w - p.pad.r - tw + 4, y + 4);
      ctx.restore();
    }
    function drawHover(p) {
      if (state.hover == null) return;
      const i = Math.max(0, Math.min(p.bars.length - 1, state.hover));
      const globalI = state.start + i;
      const x = p.x(globalI);
      ctx.strokeStyle = 'rgba(17,24,39,.25)'; ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(x, p.pad.t); ctx.lineTo(x, p.h - p.pad.b); ctx.stroke();
      ctx.setLineDash([]);
    }
    function draw() {
      clampView();
      const p = project();
      drawGrid(p);
      drawZs(p);
      drawCandles(p);
      drawLivePrice(p);
      drawMacd(p);
      if (state.layers.bi) drawLineElements(p, 'bis', getCss('--bi'), 1.7);
      if (state.layers.seg) drawLineElements(p, 'segs', getCss('--seg'), 3.2);
      drawBsp(p);
      drawHover(p);
      renderSide();
    }
    function getCss(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
    function renderTabs() {
      const tabs = document.getElementById('tabs');
      tabs.innerHTML = '';
      for (const lv of levels) {
        const btn = document.createElement('button');
        btn.textContent = levelNames[lv] || lv;
        btn.className = lv === state.level ? 'active' : '';
        btn.onclick = () => {
          state.level = lv;
          state.count = initCount[lv] || levelData().bars.length;
          state.start = Math.max(0, levelData().bars.length - state.count);
          renderTabs(); draw();
        };
        tabs.appendChild(btn);
      }
    }
    function renderSide() {
      const d = levelData();
      document.getElementById('sideTitle').textContent = (levelNames[state.level] || state.level) + ' 结构摘要';
      const c = d.chan;
      const stats = document.getElementById('stats');
      stats.innerHTML = [
        ['K线', d.bars.length], ['合并K线', c.combined_kline_count], ['笔', c.bi_count],
        ['线段', c.seg_count], ['中枢', c.zs_count], ['买卖点', c.bsp_count],
      ].map(([k,v]) => `<div class="stat"><b>${v}</b><span>${k}</span></div>`).join('');
      const bspList = document.getElementById('bspList');
      bspList.innerHTML = (d.chan.bsps || []).slice(-12).reverse().map(b => `
        <div class="item"><strong style="color:${b.is_buy ? getCss('--buy') : getCss('--sell')}">${b.is_buy ? '买点' : '卖点'} ${b.types.join(',')}</strong>
        <small>${b.time} ｜ ${b.value.toFixed(3)}</small></div>`).join('') || '<div class="item"><small>当前级别暂无买卖点</small></div>';
      const zsList = document.getElementById('zsList');
      zsList.innerHTML = (d.chan.zss || []).slice(-8).reverse().map(z => `
        <div class="item"><strong>中枢 #${z.idx} ${z.is_sure ? '' : '未确认'}</strong>
        <small>${z.start_time} 至 ${z.end_time}<br>区间 ${z.low.toFixed(3)} - ${z.high.toFixed(3)}</small></div>`).join('') || '<div class="item"><small>当前级别暂无中枢</small></div>';
    }
    function updateTooltip(evt) {
      const p = project();
      const rect = canvas.getBoundingClientRect();
      const x = evt.clientX - rect.left;
      const i = Math.floor((x - p.pad.l) / p.xStep);
      if (i < 0 || i >= p.bars.length) { tip.style.display = 'none'; state.hover = null; draw(); return; }
      state.hover = i;
      const b = p.bars[i], globalI = state.start + i;
      const near = [];
      for (const bi of levelData().chan.bis || []) {
        const s = findIndexByTime(bi.start_time), e = findIndexByTime(bi.end_time);
        if (globalI === s || globalI === e) near.push(`笔#${bi.idx} ${bi.direction}`);
      }
      for (const z of levelData().chan.zss || []) {
        const s = findIndexByTime(z.start_time), e = findIndexByTime(z.end_time);
        if (globalI >= s && globalI <= e && b.close >= z.low && b.close <= z.high) near.push(`中枢#${z.idx} ${z.low.toFixed(3)}-${z.high.toFixed(3)}`);
      }
      tip.textContent = `${b.time}\nO ${b.open.toFixed(3)} H ${b.high.toFixed(3)} L ${b.low.toFixed(3)} C ${b.close.toFixed(3)}\nV ${Math.round(b.vol).toLocaleString()}\nDIF ${b.dif.toFixed(4)} DEA ${b.dea.toFixed(4)} MACD ${b.macd.toFixed(4)}${near.length ? '\n' + near.join('\n') : ''}`;
      tip.style.display = 'block';
      tip.style.left = Math.min(rect.width - 210, x + 14) + 'px';
      tip.style.top = Math.max(8, evt.clientY - rect.top - 20) + 'px';
      draw();
    }
    canvas.addEventListener('wheel', evt => {
      evt.preventDefault();
      const old = state.count;
      const factor = evt.deltaY < 0 ? 0.82 : 1.22;
      state.count = Math.round(state.count * factor);
      const rect = canvas.getBoundingClientRect();
      const ratio = (evt.clientX - rect.left) / rect.width;
      state.start += Math.round((old - state.count) * ratio);
      draw();
    }, { passive: false });
    canvas.addEventListener('mousedown', evt => { state.dragging = true; state.dragX = evt.clientX; state.dragStart = state.start; });
    window.addEventListener('mouseup', () => { state.dragging = false; });
    window.addEventListener('mousemove', evt => {
      if (state.dragging) {
        const p = project();
        const delta = Math.round((state.dragX - evt.clientX) / p.xStep);
        state.start = state.dragStart + delta; draw();
      } else if (evt.target === canvas) updateTooltip(evt);
    });
    canvas.addEventListener('mouseleave', () => { tip.style.display = 'none'; state.hover = null; draw(); });
    document.querySelectorAll('[data-layer]').forEach(el => {
      el.addEventListener('change', e => { state.layers[e.target.dataset.layer] = e.target.checked; draw(); });
    });
    document.getElementById('zoomIn').onclick = () => { state.count = Math.round(state.count * .75); draw(); };
    document.getElementById('zoomOut').onclick = () => { state.count = Math.round(state.count * 1.35); draw(); };
    document.getElementById('reset').onclick = () => {
      state.count = initCount[state.level] || levelData().bars.length;
      state.start = Math.max(0, levelData().bars.length - state.count); draw();
    };
    document.getElementById('refreshStruct').onclick = () => { refreshStructure(); };
    window.addEventListener('resize', resizeCanvas);

    // ---------- 实时数据 ----------
    function fmtTencentTime(dateStr, timeStr) {
      const d = (dateStr || '').replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
      const t = (timeStr || '').padStart(6, '0');
      return d + ' ' + t.slice(0, 2) + ':' + t.slice(2, 4) + ':' + t.slice(4, 6);
    }
    // 浏览器端直连腾讯行情（script 注入，无跨域限制）
    function parseTencent(raw) {
      const m = raw && raw.match(/v_sh\d+="([^"]*)"/);
      if (!m || !m[1]) return null;
      const f = m[1].split('~');
      if (f.length < 35) return null;
      const price = parseFloat(f[3]);
      const prev = parseFloat(f[4]);
      const open = parseFloat(f[5]);
      const high = parseFloat(f[33]);
      const low = parseFloat(f[34]);
      const dateStr = f[30] || '';
      const timeStr = f[31] || '';
      const tt = parseInt(timeStr, 10);
      const market_status = (tt >= 93000 && tt <= 150000) ? '盘中' : '已收盘';
      const pct = prev ? (price - prev) / prev * 100 : 0;
      return {
        name: f[1] || '588710', price, prev_close: prev, open, high, low,
        pct, date: dateStr, time: timeStr, market_status,
        updated_at: fmtTencentTime(dateStr, timeStr),
        data_freshness: dateStr.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3')
      };
    }
    function fetchLivePrice() {
      return new Promise((resolve) => {
        const s = document.createElement('script');
        let done = false;
        const finish = () => {
          if (done) return; done = true;
          try { resolve(parseTencent(window.v_sh588710 || '')); }
          catch (e) { resolve(null); }
          s.onload = s.onerror = null; s.remove();
        };
        s.onload = finish;
        s.onerror = () => { resolve(null); s.remove(); };
        s.src = 'https://qt.gtimg.cn/q=sh588710';
        document.head.appendChild(s);
        setTimeout(finish, 2000);
      });
    }

    // 客户端复刻后端「下一步操作建议」逻辑（无后端时也能算）
    function levelSignal(lv) {
      const bars = lv.bars, ch = lv.chan;
      const last = bars[bars.length - 1].close;
      const bis = ch.bis || [], zss = ch.zss || [], bsps = ch.bsps || [];
      const last_bi = bis.length ? bis[bis.length - 1] : null;
      const last_zs = zss.length ? zss[zss.length - 1] : null;
      const direction = last_bi ? last_bi.direction : 'side';
      let trend_up = false, trend_down = false;
      if (bis.length >= 2) {
        const a = bis[bis.length - 2], b = bis[bis.length - 1];
        trend_up = (b.end_value > a.end_value) && (b.start_value > a.start_value);
        trend_down = (b.end_value < a.end_value) && (b.start_value < a.start_value);
      }
      let pos = 'none';
      if (last_zs) {
        if (last > last_zs.high) pos = 'above';
        else if (last < last_zs.low) pos = 'below';
        else pos = 'inside';
      }
      let recent = null;
      if (bsps.length) {
        recent = Object.assign({}, bsps[bsps.length - 1]);
        const cur_idx = last_bi ? last_bi.idx : 0;
        recent.active = (recent.bi_idx || 0) >= cur_idx - 3;
      }
      return { last, direction, trend_up, trend_down, pos,
        zs: last_zs ? [last_zs.low, last_zs.high] : null, recent };
    }
    function biasOf(grp) {
      const up = grp.some(x => x.trend_up || (x.direction === 'up' && ['above', 'inside'].includes(x.pos)));
      const down = grp.some(x => x.trend_down || (x.direction === 'down' && ['below', 'inside'].includes(x.pos)));
      if (up && !down) return '偏多';
      if (down && !up) return '偏空';
      return '震荡';
    }
    function computeSuggestionClient(data, quote) {
      const levels = (data && data.levels) || {};
      const order = ['daily', '30min', '15min', '5min', '1min'];
      const sigs = {};
      for (const lv of order) if (levels[lv]) sigs[lv] = levelSignal(levels[lv]);
      const big = ['daily', '30min'].filter(k => sigs[k]).map(k => sigs[k]);
      const small = ['5min', '1min'].filter(k => sigs[k]).map(k => sigs[k]);
      const big_bias = big.length ? biasOf(big) : '震荡';
      let small_bsp = null;
      for (const x of small) { if (x.recent && x.recent.active) { small_bsp = x.recent; break; } }
      const pos_word = { above: '中枢上方（强势区）', below: '中枢下方（弱势区）', inside: '中枢内部（震荡区）', none: '暂无中枢参考' };
      const bullets = [];
      const b0 = big[0];
      if (b0) bullets.push(`大级别（日线/30分）整体${big_bias}，现价落在${pos_word[b0.pos] || ''}。`);
      else bullets.push(`大级别方向：${big_bias}。`);
      if (small_bsp) {
        const kind = small_bsp.is_buy ? '买点' : '卖点';
        const word = small_bsp.is_buy ? '低吸' : '减仓/止盈';
        bullets.push(`小级别（5分/1分）刚出现${kind}信号 ${small_bsp.types.join(',')}（${small_bsp.value.toFixed(3)}），是短线${word}的参考位置。`);
      } else bullets.push('小级别（5分/1分）暂无新的买卖点，继续观察，不急着动。');
      if (quote) {
        const pct = quote.pct || 0;
        const arrow = pct > 0 ? '涨' : (pct < 0 ? '跌' : '平');
        bullets.push(`现价 ¥${quote.price.toFixed(3)}（${arrow} ${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%），数据为${big_bias}背景下的实时报价。`);
      }
      let action = '';
      if (big_bias === '偏多' && small_bsp && small_bsp.is_buy) action = '大方向没问题，小级别回踩给了上车机会——可分批低吸，别一把梭。';
      else if (big_bias === '偏多' && small_bsp && !small_bsp.is_buy) action = '大方向偏多但短线冲高出现卖点，仓位重的先落袋一部分，留底仓跟随。';
      else if (big_bias === '偏多') action = '还在上涨段、没到卖点，拿住即可；但别追高加仓。';
      else if (big_bias === '偏空' && small_bsp && small_bsp.is_buy) action = '大级别还在探底，小级别买点只当反弹看，轻仓试探，破位就走。';
      else if (big_bias === '偏空' && small_bsp && !small_bsp.is_buy) action = '顺势减仓，别接飞刀，等止跌信号再说。';
      else if (big_bias === '偏空') action = '弱势震荡，观望为主，等出现止跌买点再考虑。';
      else action = '多空胶着，箱体里高抛低吸或干脆不动，等方向明朗。';
      bullets.push('操作参考：' + action);
      const risk = '缠论是技术参考，不是买卖指令。ETF 有波动风险，以上仅为基于历史结构的个人研究记录，不构成投资建议。';
      return { bias: big_bias, action, bullets, risk };
    }

    // 后端优先的更新（仅本地/后端部署生效）
    function updateTicker(snap) {
      const q = snap.quote;
      const st = document.getElementById('mStatus');
      st.textContent = snap.market_status;
      st.className = 'badge' + (snap.market_status === '盘中' ? ' on' : '');
      document.getElementById('mUpdated').innerHTML = '<span class="live-dot"></span>实时数据更新于 ' + snap.updated_at;
      document.getElementById('mFresh').textContent = 'K线结构全量刷新: ' + snap.data_freshness + ' ｜ 实时价: 新浪财经(每3秒)';
      if (q) {
        const up = q.pct >= 0;
        const color = up ? getCss('--up') : getCss('--down');
        const pe = document.getElementById('mPrice'); pe.textContent = q.price.toFixed(3); pe.style.color = color;
        const ce = document.getElementById('mPct'); ce.textContent = (up ? '+' : '') + q.pct.toFixed(2) + '%'; ce.style.color = color;
        document.getElementById('mName').textContent = q.name + ' (' + SYMBOL + '.SH)';
        document.getElementById('mOHL').textContent = `开 ${q.open.toFixed(3)}  高 ${q.high.toFixed(3)}  低 ${q.low.toFixed(3)}  昨收 ${q.prev_close.toFixed(3)}`;
        document.getElementById('mTime').textContent = q.date + ' ' + q.time;
      }
    }
    function updateSuggestion(snap) {
      const s = snap.suggestion; if (!s) return;
      const be = document.getElementById('sBias');
      be.textContent = s.bias;
      be.className = 'bias ' + (s.bias === '偏多' ? 'bull' : (s.bias === '偏空' ? 'bear' : 'flat'));
      document.getElementById('sBullets').innerHTML = (s.bullets || []).map(t => `<li>${t}</li>`).join('');
      document.getElementById('sRisk').textContent = s.risk || '';
    }
    function applyLive(snap) {
      livePrice = snap.live_price;
      if (livePrice != null && DATA && DATA.levels['1min']) {
        const b = DATA.levels['1min'].bars;
        const last = b[b.length - 1];
        last.close = livePrice;
        if (livePrice > last.high) last.high = livePrice;
        if (livePrice < last.low) last.low = livePrice;
      }
      updateTicker(snap); updateSuggestion(snap);
      if (state.level) draw();
    }

    // 浏览器端实时价驱动（任何部署都生效，包括纯静态）
    function applyLivePrice(quote) {
      if (!quote) return;
      livePrice = quote.price;
      if (DATA && DATA.levels['1min']) {
        const b = DATA.levels['1min'].bars;
        const last = b[b.length - 1];
        last.close = livePrice;
        if (livePrice > last.high) last.high = livePrice;
        if (livePrice < last.low) last.low = livePrice;
      }
      const st = document.getElementById('mStatus');
      st.textContent = quote.market_status;
      st.className = 'badge' + (quote.market_status === '盘中' ? ' on' : '');
      document.getElementById('mUpdated').innerHTML = '<span class="live-dot"></span>实时数据更新于 ' + quote.updated_at;
      document.getElementById('mFresh').textContent = 'K线结构全量刷新: ' + (SNAP ? SNAP.data_freshness : '--') + ' ｜ 实时价: 腾讯行情(浏览器直连)';
      const up = quote.pct >= 0; const color = up ? getCss('--up') : getCss('--down');
      const pe = document.getElementById('mPrice'); pe.textContent = quote.price.toFixed(3); pe.style.color = color;
      const ce = document.getElementById('mPct'); ce.textContent = (up ? '+' : '') + quote.pct.toFixed(2) + '%'; ce.style.color = color;
      document.getElementById('mName').textContent = quote.name + ' (' + SYMBOL + '.SH)';
      document.getElementById('mOHL').textContent = `开 ${quote.open.toFixed(3)}  高 ${quote.high.toFixed(3)}  低 ${quote.low.toFixed(3)}  昨收 ${quote.prev_close.toFixed(3)}`;
      document.getElementById('mTime').textContent = fmtTencentTime(quote.date, quote.time);
      const s = computeSuggestionClient(DATA, quote);
      const be = document.getElementById('sBias');
      be.textContent = s.bias;
      be.className = 'bias ' + (s.bias === '偏多' ? 'bull' : (s.bias === '偏空' ? 'bear' : 'flat'));
      document.getElementById('sBullets').innerHTML = (s.bullets || []).map(t => `<li>${t}</li>`).join('');
      document.getElementById('sRisk').textContent = s.risk || '';
      if (state.level) draw();
    }
    async function tickLive() {
      const q = await fetchLivePrice();
      if (q && q.price > 0) applyLivePrice(q);
    }

    let LIVE = true;
    function buildStaticSnap(data) {
      let fresh = '';
      const lv = data.levels || {};
      for (const k of ['daily', '30min', '15min', '5min', '1min']) {
        const b = lv[k] && lv[k].bars;
        if (b && b.length) fresh = String(b[b.length - 1].time).slice(0, 10);
      }
      return {
        symbol: data.symbol, source: data.source, levels: data.levels,
        live_price: null, quote: null,
        market_status: '静态快照', updated_at: fresh, data_freshness: fresh,
        suggestion: {
          bias: '—',
          bullets: ['K线结构为快照（截至 ' + fresh + '），正在通过浏览器直连腾讯行情获取实时价…'],
          risk: '本看板为缠论结构可视化，所有信号仅供学习研究，不构成投资建议。'
        }
      };
    }
    async function loadFull() {
      try {
        const snap = await fetch('/api/snapshot?full=1').then(r => r.json());
        LIVE = true; return snap;
      } catch (e) {
        const data = await fetch('./chanpy_data_5level.json').then(r => r.json());
        LIVE = false; return buildStaticSnap(data);
      }
    }
    async function poll() {
      try {
        const snap = await fetch('/api/snapshot').then(r => r.json());
        SNAP = snap; applyLive(snap);
      } catch (e) { /* 忽略瞬时错误 */ }
    }
    async function refreshStructure() {
      try {
        const snap = await loadFull();
        SNAP = snap;
        DATA = { symbol: snap.symbol, source: snap.source, levels: snap.levels };
        levels = ['daily', '30min', '15min', '5min', '1min'].filter(l => DATA.levels[l]);
        if (!levels.includes(state.level)) state.level = levels[0];
        applyLive(snap);
        renderTabs();
      } catch (e) {}
    }
    async function init() {
      const snap = await loadFull();
      SNAP = snap;
      DATA = { symbol: snap.symbol, source: snap.source, levels: snap.levels };
      levels = ['daily', '30min', '15min', '5min', '1min'].filter(l => DATA.levels[l]);
      state.level = levels[0];
      state.count = initCount[state.level] || DATA.levels[state.level].bars.length;
      state.start = Math.max(0, DATA.levels[state.level].bars.length - state.count);
      renderTabs();
      applyLive(snap);
      resizeCanvas();
      // 浏览器端实时价：任何部署都跑，纯静态也能实时
      tickLive();
      setInterval(tickLive, 3000);
      if (LIVE) setInterval(poll, 3000);
    }
    init();
  </script>
